<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Encryption & Decryption Project</title>

    
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>🔐 Encryption & Decryption</h2>

    
    <select id="mode">
        <option value="encrypt">Encryption Mode</option>
        <option value="decrypt">Decryption Mode</option>
    </select>

    
    <select id="method">
        <option value="base64">Base64</option>
        <option value="reverse">Reverse Text</option>
        <option value="emoji">Emoji Text</option>
        <option value="binary">Binary Code</option>
        <option value="morse">Morse Code</option>
    </select>

    
    <textarea id="inputText" rows="4" placeholder="Enter text here..."></textarea>

    
    <textarea id="outputText" rows="4" placeholder="Output will appear here..." readonly></textarea>

    
    <button id="copyBtn">📋 Copy to Clipboard</button>

    
    <div class="error" id="errorMsg"></div>

    
    <div class="history">
        <h3>🕒 Last 5 Results</h3>

        
        <button id="clearHistoryBtn">🗑 Clear History</button>

        <ul id="historyList">
            <!-- History items will appear here -->
        </ul>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
